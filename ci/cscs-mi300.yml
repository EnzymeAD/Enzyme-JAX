include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

test-gb-25:
  extends: .baremetal-runner-beverin-mi300
  variables:
    JULIA: /users/lraess/julia_amd/juliaup/julia-1.11.9+0.x64.linux.gnu/bin/julia
    UENV: 10d4b63b15c81616
    JULIA_PKG_SERVER_REGISTRY_PREFERENCE: conservative
    JULIA_MAX_NUM_PRECOMPILE_FILES: 3
    # Pinned configuration — expand into a matrix once the single case passes
    REACTANT_COMMIT: main
    GB25_COMMIT: main
    FLOAT_TYPE: '--float-type=Float64'
    # Slurm resource request
    SLURM_JOB_NUM_NODES: 1
    SLURM_NTASKS_PER_NODE: 1
    SLURM_GPUS_PER_TASK: 4
    SLURM_TIMELIMIT: "02:30:00"
    # Paths — all under CI_PROJECT_DIR (scratch) to avoid touching user home/cache
    REACTANT_DIR: "${CI_PROJECT_DIR}/Reactant.jl"
    GB25_DIR: "${CI_PROJECT_DIR}/GB-25"
    LOCAL_BIN: "${CI_PROJECT_DIR}/bin"
    JULIA_DEPOT_PATH: "${CI_PROJECT_DIR}/.julia"    # overrides default ~/.julia
    BAZELISK_HOME: "${CI_PROJECT_DIR}/.bazelisk"   # overrides default ~/.cache/bazelisk
    BAZEL_OUTPUT_ROOT: "${CI_PROJECT_DIR}/.bazel"  # used by the bazel wrapper
    # ROCm/MIOpen paths — UENV-specific, must be updated when the UENV hash changes.
    # ROCM_PATH is used by Bazel's rocm_configure.bzl to locate headers and libraries.
    # CPATH adds the MIOpen include directory so clang finds <miopen/miopen.h>.
    ROCM_PATH: "/user-environment/env/default"
    CPATH: "/user-environment/linux-zen3/miopen-hip-7.2.3-22x3pq72goxi4xwkknlspqhxbx72owes/include"

  script:
    # Create all job-scoped directories up front
    - mkdir -p "${LOCAL_BIN}" "${JULIA_DEPOT_PATH}" "${BAZELISK_HOME}" "${BAZEL_OUTPUT_ROOT}"

    # Download bazelisk and create bazelisk/bazel wrappers that inject --output_user_root.
    # build_local.jl calls `bazelisk` directly, so the wrapper must intercept that name.
    # The wrapper aborts if BAZEL_OUTPUT_ROOT is unset or outside CI_PROJECT_DIR.
    - |
      curl -fsSL -o "${LOCAL_BIN}/bazelisk-real" \
        https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
      chmod +x "${LOCAL_BIN}/bazelisk-real"
      for CMD in bazelisk bazel; do
        printf '#!/bin/bash\nset -euo pipefail\n' > "${LOCAL_BIN}/${CMD}"
        printf 'if [[ -z "${BAZEL_OUTPUT_ROOT:-}" ]]; then\n' >> "${LOCAL_BIN}/${CMD}"
        printf '  echo "ERROR: BAZEL_OUTPUT_ROOT is not set. Refusing to run (would write to ~/.cache/bazel)." >&2\n' >> "${LOCAL_BIN}/${CMD}"
        printf '  exit 1\n' >> "${LOCAL_BIN}/${CMD}"
        printf 'fi\n' >> "${LOCAL_BIN}/${CMD}"
        printf 'if [[ "${BAZEL_OUTPUT_ROOT}" != "${CI_PROJECT_DIR}"* ]]; then\n' >> "${LOCAL_BIN}/${CMD}"
        printf '  echo "ERROR: BAZEL_OUTPUT_ROOT (${BAZEL_OUTPUT_ROOT}) is not under CI_PROJECT_DIR (${CI_PROJECT_DIR})." >&2\n' >> "${LOCAL_BIN}/${CMD}"
        printf '  exit 1\n' >> "${LOCAL_BIN}/${CMD}"
        printf 'fi\n' >> "${LOCAL_BIN}/${CMD}"
        printf 'exec "$(dirname "$0")/bazelisk-real" --output_user_root="${BAZEL_OUTPUT_ROOT}" "$@"\n' >> "${LOCAL_BIN}/${CMD}"
        chmod +x "${LOCAL_BIN}/${CMD}"
      done
    - export PATH="${LOCAL_BIN}:${PATH}"
    # Verify the wrappers are resolved first — catch misconfigured PATH early
    - |
      for CMD in bazelisk bazel; do
        RESOLVED=$(command -v "${CMD}")
        if [[ "${RESOLVED}" != "${LOCAL_BIN}/${CMD}" ]]; then
          echo "ERROR: ${CMD} resolves to ${RESOLVED}, expected ${LOCAL_BIN}/${CMD}" >&2
          exit 1
        fi
        echo "OK: ${CMD} -> ${RESOLVED}"
      done

    # Clone Reactant.jl and patch in the current Enzyme-JAX commit
    - git clone --depth=1 --branch "${REACTANT_COMMIT}" https://github.com/EnzymeAD/Reactant.jl "${REACTANT_DIR}"
    - sed -i 's/ENZYMEXLA_COMMIT = ".*"/ENZYMEXLA_COMMIT = "'"${CI_COMMIT_SHA}"'"/' "${REACTANT_DIR}/deps/ReactantExtra/WORKSPACE"
    - grep ENZYMEXLA_COMMIT "${REACTANT_DIR}/deps/ReactantExtra/WORKSPACE"

    # Instantiate the Reactant build environment (no GPU/UENV needed here)
    - cd "${REACTANT_DIR}/deps" && ${JULIA} --project --color=yes -e 'using Pkg; Pkg.instantiate()'

    # Build a ROCm overlay that Bazel's rocm_configure.bzl can use.
    #
    # Problem: the UENV spack view at /user-environment/env/default merges
    # headers from all installed packages, but some packages (rocm-core, hip,
    # miopen, etc.) end up with *incomplete* include subdirectories in the view
    # — they're present so [[ -e ]] passes, but the specific version headers
    # that find_rocm_config.py requires are missing.
    #
    # Solution: seed from the view, then for each of the 11 headers that
    # find_rocm_config.py checks, glob for the spack package that actually
    # contains the file and unconditionally symlink that package's subdir into
    # the overlay (overwriting whatever the view put there).  Finally auto-fill
    # any remaining gaps from the full spack install tree.
    - |
      SPACK="/user-environment/linux-zen3"
      ROCM_OVERLAY="${CI_PROJECT_DIR}/.rocm"
      mkdir -p "${ROCM_OVERLAY}/include"
      # Step 1: seed from the UENV view
      for f in /user-environment/env/default/include/*; do
        [[ -e "$f" ]] && ln -sfn "$f" "${ROCM_OVERLAY}/include/$(basename "$f")"
      done
      # Step 2: for every include subdir that find_rocm_config.py checks,
      # find the spack package that actually has the version file and force-override.
      # Format: "<overlay_subdir>:<spack_pkg_name_glob>:<verify_file_relative_to_subdir>"
      for entry in \
          "rocm-core:rocm-core-*:rocm_version.h" \
          "hip:hip-*:hip_version.h" \
          "miopen:miopen-hip-*:version.h" \
          "rocblas:rocblas-*:internal/rocblas-version.h" \
          "rocrand:rocrand-*:rocrand_version.h" \
          "rocfft:rocfft-*:rocfft-version.h" \
          "hipfft:hipfft-*:hipfft-version.h" \
          "roctracer:roctracer-*:roctracer.h" \
          "hipsparse:hipsparse-*:hipsparse-version.h" \
          "hipsolver:hipsolver-*:internal/hipsolver-version.h" \
          "rocsolver:rocsolver-*:rocsolver-version.h"; do
        IFS=: read -r subdir pkg_glob verify <<< "${entry}"
        for pkg in "${SPACK}"/${pkg_glob}/; do
          [[ -f "${pkg}include/${subdir}/${verify}" ]] || continue
          ln -sfn "${pkg}include/${subdir}" "${ROCM_OVERLAY}/include/${subdir}"
          echo "overlay: ${subdir} -> ${pkg}include/${subdir}"
          break
        done
      done
      # Step 3: auto-fill any remaining missing include items from all spack packages
      for pkg in "${SPACK}"/*/; do
        [[ -d "${pkg}include" ]] || continue
        for inc_item in "${pkg}include/"*; do
          [[ -e "${inc_item}" ]] || continue
          name="$(basename "${inc_item}")"
          target="${ROCM_OVERLAY}/include/${name}"
          [[ -e "${target}" ]] || ln -sfn "${inc_item}" "${target}"
        done
      done
      # Step 4: top-level dirs from view
      for d in lib lib64 bin share; do
        [[ -e "/user-environment/env/default/${d}" ]] && \
          ln -sfn "/user-environment/env/default/${d}" "${ROCM_OVERLAY}/${d}"
      done
      export ROCM_PATH="${ROCM_OVERLAY}"

    # Forward ROCM_PATH and TF_ROCM_AMDGPU_TARGETS into Bazel repository rules.
    # ROCM_PATH tells rocm_configure where the overlay is.
    # TF_ROCM_AMDGPU_TARGETS prevents rocm_configure from calling rocm_agent_enumerator
    # (which only works inside a GPU srun allocation, not in this CI step).
    - echo "build --repo_env=ROCM_PATH=${CI_PROJECT_DIR}/.rocm" >> "${REACTANT_DIR}/deps/ReactantExtra/.bazelrc"
    - echo "build --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx942" >> "${REACTANT_DIR}/deps/ReactantExtra/.bazelrc"

    # Diagnostic: verify overlay and .bazelrc look correct before invoking Bazel
    - |
      echo "=== ROCM overlay check ==="
      echo "ROCM_PATH=${ROCM_PATH}"
      grep ROCM_PATH "${REACTANT_DIR}/deps/ReactantExtra/.bazelrc" || echo "(no ROCM_PATH in .bazelrc)"
      # All header files that find_rocm_config.py requires
      for f in \
        rocm-core/rocm_version.h \
        hip/hip_version.h \
        miopen/version.h \
        rocblas/internal/rocblas-version.h \
        rocrand/rocrand_version.h \
        rocfft/rocfft-version.h \
        hipfft/hipfft-version.h \
        roctracer/roctracer.h \
        hipsparse/hipsparse-version.h \
        hipsolver/internal/hipsolver-version.h \
        rocsolver/rocsolver-version.h; do
        path="${CI_PROJECT_DIR}/.rocm/include/${f}"
        [[ -e "${path}" ]] && echo "OK: ${f}" || echo "MISSING: ${f}"
      done
      echo "==========================="

    # Build libReactant — --export=ALL forwards all path/cache env vars into the srun allocation
    - |
      srun -n 1 --export=ALL --uenv "${UENV}" --view=default \
        bash -c "cd ${REACTANT_DIR}/deps && \
                 ${JULIA} --project --color=yes -O0 build_local.jl \
                   --cc=clang --gcc_host_compiler_path="

    # Clone GB-25 and set up its Julia environment
    - git clone --depth=1 --branch "${GB25_COMMIT}" https://github.com/PRONTOLab/GB-25 "${GB25_DIR}"
    - cp "${REACTANT_DIR}/LocalPreferences.toml" "${GB25_DIR}/LocalPreferences.toml"
    - |
      cd "${GB25_DIR}" && ${JULIA} --project --color=yes -e "
        using Pkg
        Pkg.add([
            PackageSpec(; name=\"ReactantCore\", rev=\"${REACTANT_COMMIT}\"),
            PackageSpec(; name=\"Reactant\",     rev=\"${REACTANT_COMMIT}\"),
        ])
        Pkg.instantiate()
        Pkg.gc()"

    # Compile the GB-25 simulation
    - |
      srun -n 1 --export=ALL --uenv "${UENV}" --view=default \
        timeout 29m \
        ${JULIA} --color=yes --project -O0 --startup-file=no --threads=16 \
          --compiled-modules=strict \
          "${GB25_DIR}/sharding/sharded_baroclinic_instability_simulation_compile.jl" \
          ${FLOAT_TYPE}

    # Check remaining collective operations against thresholds (copied from A100 case; calibrate for MI300)
    - |
      cd "${GB25_DIR}"
      OK="true"
      ALL_TO_ALL_THRESHOLD=1000
      ALL_GATHER_THRESHOLD=1000
      ALL_REDUCE_THRESHOLD=1000
      COLLECTIVE_PERMUTE_THRESHOLD=29900  # TODO: calibrate for MI300

      for OP in "all-to-all" "all-gather" "all-reduce" "%collective-permute-start.* ="; do
          COLLECTIVES=$(find . -name 'optimised_sharded_baroclinic_instability*.xla' \
              -exec grep --with-filename --line-number --extended-regexp "${OP}" '{}' \; | sort)
          NUM_COLLECTIVES=$(echo "${COLLECTIVES}" | grep -c . || true)
          if [[ -n "${COLLECTIVES}" ]]; then
              echo "Found ${NUM_COLLECTIVES} remaining '${OP}' operations"
              echo "${COLLECTIVES}"
              if [[ "${OP}" == "all-to-all" && ${NUM_COLLECTIVES} -gt ${ALL_TO_ALL_THRESHOLD}           ]] || \
                 [[ "${OP}" == "all-gather" && ${NUM_COLLECTIVES} -gt ${ALL_GATHER_THRESHOLD}           ]] || \
                 [[ "${OP}" == "all-reduce" && ${NUM_COLLECTIVES} -gt ${ALL_REDUCE_THRESHOLD}           ]] || \
                 [[ "${OP}" =~ "collective-permute" && ${NUM_COLLECTIVES} -gt ${COLLECTIVE_PERMUTE_THRESHOLD} ]]; then
                  OK="false"
              fi
          fi
      done
      [[ "${OK}" == "true" ]] || exit 1

    # Run the GB-25 simulation
    - |
      srun -n 1 --export=ALL --uenv "${UENV}" --view=default \
        timeout 59m \
        ${JULIA} --color=yes --project -O0 --startup-file=no --threads=16 \
          --compiled-modules=strict \
          "${GB25_DIR}/sharding/sharded_baroclinic_instability_simulation_run.jl" \
          ${FLOAT_TYPE}

    # Test correctness
    - |
      srun -n 1 --export=ALL --uenv "${UENV}" --view=default \
        timeout 19m \
        ${JULIA} --color=yes --project -O0 --startup-file=no --threads=16 \
          --compiled-modules=strict \
          "${GB25_DIR}/correctness/correctness_sharded_baroclinic_instability_simulation_run.jl" \
          ${FLOAT_TYPE}
