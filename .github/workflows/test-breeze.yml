name: Test Breeze

on:
  push:
    branches:
    - main
    paths: &paths
      - '.github/workflows/test-breeze.yml'
      - '**/BUILD'
      - '**/WORKSPACE'
      - '**/*.bzl'
      - 'patches/**'
      - 'src/**'
      - 'third_party/**'
  pull_request:
    branches:
    - main
    paths: *paths

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

env:
  JULIA_PKG_SERVER_REGISTRY_PREFERENCE: 'eager'
  JULIA_MAX_NUM_PRECOMPILE_FILES: 3

jobs:
  test-breeze:
    name: 'Test Breeze - ${{ matrix.os }} - julia ${{ matrix.julia_version }} - XLA ${{ matrix.xla_commit }} - Breeze ${{ matrix.breeze_commit }} - Reactant ${{ matrix.reactant_commit }}'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150

    container:
      image: ${{ (contains(matrix.os, 'linux') && 'ghcr.io/enzymead/reactant-docker-images@sha256:cd45d851f5ea544f88d042eafefa53d948c229fffcab6189019324e3b02b505a' ) || '' }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - linux-x86-a2-48-a100-4gpu
          - linux-x86-ct6e-180-4tpu
        julia_version:
          - '1.11'
        xla_commit:
          - ''
        breeze_commit:
          - 'main'
        reactant_commit:
          - 'main'
        # The vanilla (eager KernelAbstractions/CUDA) backend has no TPU path,
        # so TPU runs Reactant only while the A100 compares vanilla vs Reactant.
        include:
          - os: linux-x86-a2-48-a100-4gpu
            device: GPU
            backend: 'vanilla, reactant'
          - os: linux-x86-ct6e-180-4tpu
            device: TPU
            backend: 'reactant'

    steps:
      - name: Check GPUs
        if: ${{ contains(matrix.os, 'a100') }}
        run: |
          nvidia-smi
      - name: Set Artifacts index
        shell: bash
        run: |
          # Artifact names cannot include forward slashes and some other characters, here we
          # do some sanitisation.
          ARTIFACT_INDEX="${{ matrix.os}}-${{ matrix.julia_version }}-${{ matrix.xla_commit }}-${{ matrix.breeze_commit }}-${{ matrix.reactant_commit }}"
          # Replace forward slashes with underscores
          ARTIFACT_INDEX=${ARTIFACT_INDEX//\//_}
          # Remove all spaces
          ARTIFACT_INDEX=${ARTIFACT_INDEX// /}
          echo "ARTIFACT_INDEX=${ARTIFACT_INDEX}" >> "${GITHUB_ENV}"
      - uses: bazel-contrib/setup-bazel@0.19.0
        name: Set up Bazel
        with:
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow only for macOS.
          disk-cache: ${{ runner.os == 'macOS' && format('breeze-{0}-{1}', github.workflow, matrix.os) || false }}
          # Do not share repository cache between workflows.
          repository-cache: false
          bazelisk-version: 1.x
      - name: Checkout Reactant.jl
        uses: actions/checkout@v6
        with:
          repository: 'EnzymeAD/Reactant.jl'
          ref: ${{ matrix.reactant_commit }}
          path: 'Reactant.jl'
      - name: Set REACTANT_DIR
        # We have to use `${GITHUB_WORKSPACE}` instead of `github.workspace` because GitHub
        # is terrible and the two don't match inside containers:
        # https://github.com/actions/runner/issues/2058
        run: |
          REACTANT_DIR=${GITHUB_WORKSPACE}/Reactant.jl
          # Make sure this directory exists, for good measure
          ls -lhrt "${REACTANT_DIR}"
          echo "REACTANT_DIR=${REACTANT_DIR}" >> ${GITHUB_ENV}
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia_version }}
      - name: Load Julia packages from cache
        uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0
        with:
          gcp-bucket: enzyme-ci-transient
      - name: Modify Enzyme-JAX commit
        timeout-minutes: 1
        run: |
          sed -i.bak 's/ENZYMEXLA_COMMIT = ".*"/ENZYMEXLA_COMMIT = "${{ github.sha }}"/' ReactantExtra/WORKSPACE

          cat ReactantExtra/WORKSPACE
        working-directory: ${{ env.REACTANT_DIR }}/deps
      - name: Modify XLA commit
        timeout-minutes: 1
        shell: bash
        run: |
          if [[ -n "${{ matrix.xla_commit }}" ]]; then
              sed -E -i.bak \
                  -e 's/xla_workspace\(NEW_XLA_PATCHES(, .*)?\)/xla_workspace(NEW_XLA_PATCHES, "${{ matrix.xla_commit }}")/' \
                  ReactantExtra/WORKSPACE

              cat ReactantExtra/WORKSPACE
          fi
        working-directory: ${{ env.REACTANT_DIR }}/deps
      - name: Build local libReactant
        timeout-minutes: 60
        run: |
          julia --project --color=yes -e 'using Pkg; Pkg.instantiate()'
          julia --project --color=yes -O0 build_local.jl --cc=clang --gcc_host_compiler_path= --push-cache
        working-directory: ${{ env.REACTANT_DIR }}/deps
      - name: Copy libdevice
        if: ${{ contains(matrix.os, 'a100') }}
        timeout-minutes: 10
        shell: bash
        run: |
          if [[ ! -e bazel-bin/cuda/nvvm/libdevice/libdevice.10.bc ]]; then
              mkdir -pv bazel-bin/cuda/nvvm/libdevice
              cp -v bazel-bin/libReactantExtra.so.runfiles/cuda_nvcc/nvvm/libdevice/libdevice.10.bc bazel-bin/cuda/nvvm/libdevice/libdevice.10.bc
          fi
        working-directory: ${{ env.REACTANT_DIR }}/deps/ReactantExtra
      - name: Checkout Breeze
        uses: actions/checkout@v6
        with:
          repository: 'NumericalEarth/Breeze.jl'
          ref: ${{ matrix.breeze_commit }}
          path: 'Breeze.jl'
      - name: Set BREEZE_DIR
        # We have to use `${GITHUB_WORKSPACE}` instead of `github.workspace` because GitHub
        # is terrible and the two don't match inside containers:
        # https://github.com/actions/runner/issues/2058
        run: |
          BREEZE_DIR=${GITHUB_WORKSPACE}/Breeze.jl
          # Make sure this directory exists, for good measure
          ls -lhrt "${BREEZE_DIR}"
          echo "BREEZE_DIR=${BREEZE_DIR}" >> ${GITHUB_ENV}
      - name: Instantiate Breeze benchmarking environment
        timeout-minutes: 40
        shell: julia --color=yes --project {0}
        run: |
          # Point the benchmarking environment at the freshly built libReactant
          cp("${{ env.REACTANT_DIR }}/LocalPreferences.toml", "LocalPreferences.toml")

          using Pkg
          if !isempty("${{ matrix.reactant_commit }}")
              # Install specific commit of Reactant, if necessary
              Pkg.add([
                  PackageSpec(; name="ReactantCore", rev="${{ matrix.reactant_commit }}"),
                  PackageSpec(; name="Reactant", rev="${{ matrix.reactant_commit }}"),
              ])
          end
          # Instantiate environment
          Pkg.instantiate()
          # Cleanup depot if possible
          Pkg.gc()
        working-directory: ${{ env.BREEZE_DIR }}/benchmarking
      - name: Upload Julia project environment
        uses: actions/upload-artifact@v7
        timeout-minutes: 10
        if: ${{ always() }}
        with:
          name: 'julia-environment-${{ env.ARTIFACT_INDEX }}'
          path: |
            ${{ env.BREEZE_DIR }}/benchmarking/Manifest.toml
            ${{ env.BREEZE_DIR }}/benchmarking/Project.toml
          retention-days: 90
          overwrite: false
      - name: Run single (scalar) tendency benchmark
        timeout-minutes: 60
        run: |
          export XLA_FLAGS='--xla_disable_hlo_passes=multi_output_fusion --xla_dump_hlo_pass_re=.* --xla_dump_to=${{ env.BREEZE_DIR }}/benchmarking/xla_dump'
          timeout --signal=TERM --verbose 59m julia --color=yes --project -O0 --startup-file=no run_benchmarks.jl \
              --device ${{ matrix.device }} --mode scalar_tendency \
              --dynamics none --microphysics none --topology PPB \
              --advection "WENO5, WENO7, WENO9" --size 256x256x128 \
              --backend "${{ matrix.backend }}" --float_type Float32,BFloat16 --time_steps 320
        working-directory: ${{ env.BREEZE_DIR }}/benchmarking
      - name: Run full model tendency benchmark
        timeout-minutes: 60
        run: |
          export XLA_FLAGS='--xla_disable_hlo_passes=multi_output_fusion --xla_dump_hlo_pass_re=.* --xla_dump_to=${{ env.BREEZE_DIR }}/benchmarking/xla_dump'
          timeout --signal=TERM --verbose 59m julia --color=yes --project -O0 --startup-file=no run_benchmarks.jl \
              --device ${{ matrix.device }} --mode model_tendency \
              --dynamics none --microphysics none --topology PPB \
              --advection "WENO5, WENO7, WENO9" --size 256x256x128 \
              --backend "${{ matrix.backend }}" --float_type Float32 --time_steps 320
        working-directory: ${{ env.BREEZE_DIR }}/benchmarking
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          name: 'benchmark-results-${{ env.ARTIFACT_INDEX }}'
          path: '${{ env.BREEZE_DIR }}/benchmarking/benchmark_results.*'
          retention-days: 90
          overwrite: false
      - name: Upload MLIR dumps
        uses: actions/upload-artifact@v7
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          name: 'mlir-dumps-${{ env.ARTIFACT_INDEX }}'
          path: '${{ env.BREEZE_DIR }}/benchmarking/mlir_dumps'
          if-no-files-found: ignore
          retention-days: 90
          overwrite: false
      - name: Upload XLA dump
        uses: actions/upload-artifact@v7
        timeout-minutes: 20
        if: ${{ !cancelled() }}
        with:
          name: 'xla-dump-${{ env.ARTIFACT_INDEX }}'
          path: '${{ env.BREEZE_DIR }}/benchmarking/xla_dump'
          if-no-files-found: ignore
          retention-days: 90
          overwrite: false
      - name: Upload XLA profiler traces
        uses: actions/upload-artifact@v7
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          name: 'xla-profile-${{ env.ARTIFACT_INDEX }}'
          path: '${{ env.BREEZE_DIR }}/benchmarking/profiles'
          if-no-files-found: ignore
          retention-days: 90
          overwrite: false

  # Track A100 + TPU tendency throughput over Enzyme-JAX commits and comment on
  # PRs (both regressions and speedups are visible in the always-posted table).
  # The baseline lives in this repo's gh-pages branch, so it uses only the
  # default GITHUB_TOKEN (no cross-org credential). Fork PRs are skipped
  # (read-only token can't push gh-pages / comment).
  publish-breeze-benchmarks:
    name: "Publish Breeze tendency benchmarks (A100 + TPU)"
    needs: test-breeze
    if: ${{ github.event_name == 'push' || !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: "Check out repository"
        uses: actions/checkout@v6
      - name: "Download benchmark results"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: 'benchmark-results-*'
      - name: "Build github-action-benchmark JSON"
        shell: python
        run: |
          # test-breeze emits only scalar_tendency / model_tendency results, so
          # every entry uses the tendency naming (matches Breeze's dashboard):
          #   <ScalarTendency|ModelTendency>; Grid: NxNxN / Advection: WENOx / <gpu> / <ft> <backend>
          import json, glob

          all_data = []
          for path in sorted(glob.glob('benchmark-results-*/benchmark_results.json')):
              with open(path) as f:
                  all_data.extend(json.load(f))

          data = []
          for d in all_data:
              base_name = d['name'].split('_')[0]
              advection = d['advection']
              ft = d['float_type']
              backend = d.get('backend', 'vanilla')
              # A null gpu_name here comes from the TPU run (A100 gets a CUDA
              # name); label it so both machines are distinct, readable series.
              gpu = d['metadata']['gpu_name'] or 'TPU'
              grid = d['grid_size']
              grid_str = f"{grid[0]}x{grid[1]}x{grid[2]}"
              ft_short = {'Float32': 'F32', 'BFloat16': 'BF16', 'Float64': 'F64'}.get(ft, ft)

              level_1 = f'{base_name}; Grid: {grid_str}'
              level_2 = f'Advection: {advection}'
              level_3 = f'{gpu}'
              level_4 = f'{ft_short} {backend}'

              name = f"{level_1}/{level_2}/{level_3}/{level_4}"
              data.append({'name': name, 'unit': 'points/s', 'value': d['grid_points_per_second']})

          with open('github-action-benchmark.json', 'w') as f:
              json.dump(data, f)
      - name: "Track / compare Breeze tendency performance"
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: Breeze tendency
          tool: "customBiggerIsBetter"
          output-file-path: "github-action-benchmark.json"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: "dev/breeze-tendency"
          alert-threshold: "110%"
          comment-always: true
          fail-on-alert: false
          # Update the baseline only when landing on main; PRs just compare + comment.
          auto-push: ${{ github.event_name == 'push' }}
          max-items-in-chart: 1000
